services:
  # PostgreSQL database for LangGraph and metadata
  postgres:
    image: pgvector/pgvector:pg18
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aegra Server
  aegra:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/app/src:/app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./aegra.json:/app/aegra.json:ro
      - ./examples:/app/examples:ro
      - ./libs/aegra-api/src:/app/src:ro  # Mount full src for PYTHONPATH to work
      - ./libs/aegra-api/alembic:/app/alembic:ro # for migrations
      - ./.env:/app/.env:ro
      - ./app_integrations:/app/app_integrations:ro
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Aegra server...' &&
        uvicorn aegra_api.main:app --host 0.0.0.0 --port $${PORT:-8000} --reload
      "

  # Neo4j MCP (HTTP) — long-lived mcp-neo4j-cypher for LangChain MultiServerMCPClient.
  # Set NEO4J_URI / credentials in .env; agents use NEO4J_MCP_HOST (e.g. http://neo4j-mcp:8811 → …/mcp).
  neo4j-mcp:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.neo4j-mcp
    ports:
      - "${NEO4J_MCP_PUBLISH_PORT:-8811}:8811"
    env_file:
      - .env
    environment:
      NEO4J_TRANSPORT: http
      NEO4J_MCP_SERVER_HOST: 0.0.0.0
      NEO4J_MCP_SERVER_PORT: 8811
      NEO4J_READ_ONLY: "true"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1,neo4j-mcp,host.docker.internal"
    profiles:
      - neo4j

  # Redis (optional - for advanced queuing in future phases)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - redis

volumes:
  postgres_data:
  redis_data:
