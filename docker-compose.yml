services:
  # PostgreSQL database for LangGraph and metadata
  postgres:
    image: pgvector/pgvector:pg18
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Aegra Server
  aegra:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - PYTHONPATH=/app/src:/app
      # react_agent MCP client; default reaches neo4j-mcp on the Compose network (see --profile neo4j).
      # Override in .env e.g. http://127.0.0.1:8811 only makes sense for API outside Docker.
      - NEO4J_MCP_HOST=${NEO4J_MCP_HOST:-http://neo4j-mcp:8811}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./aegra.json:/app/aegra.json:ro
      - ./examples:/app/examples:ro
      - ./libs/aegra-api/src:/app/src:ro  # Mount full src for PYTHONPATH to work
      - ./libs/aegra-api/alembic:/app/alembic:ro # for migrations
      - ./.env:/app/.env:ro
      - ./app_integrations:/app/app_integrations:ro
      - ./tenant:/app/tenant:ro
    command: >
      sh -c "
        echo 'Running database migrations...' &&
        alembic upgrade head &&
        echo 'Starting Aegra server...' &&
        uvicorn aegra_api.main:app --host 0.0.0.0 --port $${PORT:-8000} --reload
      "

  # Neo4j (Bolt + APOC) — required for mcp-neo4j-cypher `get_neo4j_schema`.
  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_PUBLISH_HTTP:-7474}:7474"
      - "${NEO4J_PUBLISH_BOLT:-7687}:7687"
    environment:
      # Auth only via NEO4J_AUTH — do NOT set NEO4J_PASSWORD here (Neo4j maps NEO4J_* to config and treats PASSWORD as invalid).
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      # HTTP port comes up when DB is ready; avoids embedding password in healthcheck.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    profiles:
      - neo4j

  # Neo4j MCP (HTTP) — long-lived mcp-neo4j-cypher for LangChain MultiServerMCPClient.
  # Bolt URL overridden to the neo4j service on the Compose network.
  neo4j-mcp:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile.neo4j-mcp
    ports:
      - "${NEO4J_MCP_PUBLISH_PORT:-8811}:8811"
    environment:
      NEO4J_TRANSPORT: http
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8811"
      NEO4J_READ_ONLY: "true"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1,neo4j-mcp,neo4j,host.docker.internal"
    depends_on:
      neo4j:
        condition: service_healthy
    profiles:
      - neo4j

  # Redis (optional - for advanced queuing in future phases)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    profiles:
      - redis

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
