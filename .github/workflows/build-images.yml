name: Build images

on:
  # push:
  #   branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: eu-west-1
  AWS_ACCOUNT_ID: "042993547532"
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: langraph-server
            context: .
            dockerfile: langraph_server/Dockerfile
            repository: axes/langraph-server
          - name: neo4j-mcp
            context: neo4j_mcp
            dockerfile: neo4j_mcp/Dockerfile
            repository: axes/neo4j-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::042993547532:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:${{ env.IMAGE_TAG }}
            ${{ steps.ecr.outputs.registry }}/${{ matrix.repository }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}-arm64
