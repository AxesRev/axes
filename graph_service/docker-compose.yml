# Neo4j (with APOC) + neo4j-mcp HTTP — graph tooling stack for axes / react_agent.
#
# From repository root so Compose can substitute `${NEO4J_PASSWORD}` from `.env`:
#   docker compose -f graph_service/docker-compose.yml up -d
#
# Neo4j Browser: http://localhost:${NEO4J_PUBLISH_HTTP:-7474}
# Bolt from host: bolt://localhost:${NEO4J_PUBLISH_BOLT:-7687}
# MCP HTTP from host: http://localhost:${NEO4J_MCP_PUBLISH_PORT:-8811}/mcp
#
# Inside this compose network, neo4j-mcp connects with bolt://neo4j:7687 (set explicitly below).

name: axes-graph

services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "${NEO4J_PUBLISH_HTTP:-7474}:7474"
      - "${NEO4J_PUBLISH_BOLT:-7687}:7687"
    environment:
      # Never set NEO4J_PASSWORD on this service — Neo4j treats unknown NEO4J_* as config keys (`PASSWORD` is invalid).
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s

  neo4j-mcp:
    build:
      context: ../neo4j_mcp
      dockerfile: Dockerfile
    ports:
      - "${NEO4J_MCP_PUBLISH_PORT:-8811}:8811"
    environment:
      NEO4J_TRANSPORT: http
      # Must use service hostname; ignore bolt://localhost in .env when running in Compose.
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      NEO4J_MCP_SERVER_HOST: "0.0.0.0"
      NEO4J_MCP_SERVER_PORT: "8811"
      NEO4J_READ_ONLY: "true"
      NEO4J_MCP_SERVER_ALLOWED_HOSTS: "localhost,127.0.0.1,neo4j-mcp,neo4j,host.docker.internal"
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
